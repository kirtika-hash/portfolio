<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="td.css">
</head>
<body>

<div class="container">

    <div class="todo-box">

        <h1>📝 Task Manager</h1>

        <div class="input-box">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter your task..."
            >

            <button id="addBtn">Add</button>
        </div>

        <ul id="taskList"></ul>

    </div>

</div>

<script src="td.js"></script>

</body>
</html>
