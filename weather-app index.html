<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link rel="stylesheet" href="weat.css">
</head>
<body>

<div class="container">

    <div class="weather-card">

        <h1>🌤 Weather App</h1>

        <div class="search-box">
            <input type="text" id="city" placeholder="Enter city name">
            <button onclick="getWeather()">Search</button>
        </div>

        <div id="weather" class="weather-info">

            <img id="icon">

            <h2 id="cityName"></h2>

            <h1 id="temp"></h1>

            <p id="description"></p>

            <div class="details">

                <div>
                    <h3>Humidity</h3>
                    <p id="humidity"></p>
                </div>

                <div>
                    <h3>Wind</h3>
                    <p id="wind"></p>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="weat.js"></script>

</body>
</html>
